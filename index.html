<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏙️ 哈尔滨3D城市</title>
<style>
* {margin:0;padding:0;box-sizing:border-box}
html,body {height:100%;overflow:hidden;background:#000}
#c {width:100%;height:100%;display:block}
#ui {position:fixed;top:0;left:0;right:0;padding:12px 20px;background:linear-gradient(180deg,rgba(0,0,0,0.85),transparent);z-index:100}
.title {font-size:18px;font-weight:bold;color:#00d4ff}
.controls {position:fixed;bottom:20px;left:20px;background:rgba(0,0,0,0.8);padding:10px 14px;border-radius:8px;font-size:11px;color:#888}
.controls k {color:#00d4ff}
</style>
</head>
<body>
<div id="ui">
<div class="title">🏙️ 哈尔滨3D城市 - WASD移动 | 鼠标视角 | 点击进入</div>
</div>
<div class="controls">
<k>WASD</k> 移动 &nbsp; <k>鼠标</k> 视角 &nbsp; <k>Shift</k> 加速
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const buildings = [
{name:"索菲亚教堂",x:-40,z:-60,h:55,w:30,d:25,color:0xd4c4a8},
{name:"曼哈顿商厦",x:-20,z:-40,h:85,w:35,d:25,color:0x2a3a4a},
{name:"金安欧罗巴",x:10,z:-30,h:70,w:30,d:22,color:0x3a2a1a},
{name:"中央商城",x:-15,z:-55,h:60,w:40,d:30,color:0x1a2a3a},
{name:"秋林公司",x:50,z:-80,h:75,w:45,d:35,color:0x8a5a4a},
{name:"秋林国际",x:70,z:-90,h:100,w:38,d:30,color:0x2a3a4a},
{name:"防洪纪念塔",x:0,z:80,h:30,w:25,d:25,color:0x8a6a5a},
{name:"群力新区政府",x:-150,z:50,h:40,w:50,d:35,color:0x3a4a5a},
{name:"哈尔滨银行",x:-180,z:30,h:90,w:35,d:28,color:0x1a3a5a},
{name:"盛和天下",x:-120,z:70,h:110,w:40,d:32,color:0x2a3a4a},
{name:"哈尔滨西站",x:220,z:-120,h:50,w:160,d:90,color:0x4a5a6a},
{name:"万达广场",x:190,z:-150,h:70,w:80,d:60,color:0x8a3a4a},
{name:"龙塔",x:100,z:-20,h:200,w:25,d:25,color:0xc9a86c},
{name:"长江大厦",x:80,z:-10,h:90,w:35,d:28,color:0x3a4a5a},
{name:"华润大厦",x:60,z:-5,h:130,w:42,d:35,color:0x2a3a4a},
{name:"斯大林公园",x:10,z:130,w:300,h:3,d:60,color:0x2a5a3a},
{name:"太阳岛",x:-80,z:180,w:350,h:5,d:250,color:0x2a6a3a},
];

const roads = [
{x:0,z:-80,w:400,h:12,name:"中山路"},
{x:0,z:20,w:400,h:10,name:"友谊路"},
{x:-40,z:0,w:12,h:400,name:"中央大街"},
];

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1520);
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,2000);
camera.position.set(0,100,0);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x404060,0.6));
const sun = new THREE.DirectionalLight(0xffd4a0,1);
sun.position.set(-200,300,-100);
scene.add(sun);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000,1000),new THREE.MeshStandardMaterial({color:0x1a2030}));
ground.rotation.x = -Math.PI/2;
scene.add(ground);
scene.add(new THREE.GridHelper(1000,50,0x2a3040,0x1a2030));

buildings.forEach(b=>{
const geo = new THREE.BoxGeometry(b.w,b.h,b.d);
const mat = new THREE.MeshStandardMaterial({color:b.color,metalness:0.2,roughness:0.7});
const mesh = new THREE.Mesh(geo,mat);
mesh.position.set(b.x,b.h/2,b.z);
mesh.castShadow = true;
scene.add(mesh);
});

roads.forEach(r=>{
const road = new THREE.Mesh(new THREE.PlaneGeometry(r.w,r.h),new THREE.MeshStandardMaterial({color:0x2a2a2a}));
road.rotation.x = -Math.PI/2;
road.position.set(r.x,0.15,r.z);
scene.add(road);
});

let keys={},pitch=0,yaw=0;
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
document.addEventListener('mousemove',e=>{if(document.pointerLockElement){yaw-=e.movementX*0.002;pitch-=e.movementY*0.002;pitch=Math.max(-1.5,Math.min(1.5,pitch))}});
renderer.domElement.addEventListener('click',()=>renderer.domElement.requestPointerLock());

function animate(){
const s=keys.shift?6:3;
const f=new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0,yaw,0));
const r=new THREE.Vector3(1,0,0).applyEuler(new THREE.Euler(0,yaw,0));
if(keys.w)camera.position.addScaledVector(f,s);if(keys.s)camera.position.addScaledVector(f,-s);
if(keys.a)camera.position.addScaledVector(r,-s);if(keys.d)camera.position.addScaledVector(r,s);
camera.position.y=Math.max(10,Math.min(300,camera.position.y));
camera.position.x=Math.max(-400,Math.min(400,camera.position.x));camera.position.z=Math.max(-400,Math.min(400,camera.position.z));
camera.rotation.set(pitch,yaw,0,'YXZ');
renderer.render(scene,camera);requestAnimationFrame(animate);
}animate();
window.onresize=()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)};
</script>
</body>
</html>
