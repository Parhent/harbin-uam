<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏙️ 哈尔滨3D漫游</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#000;touch-action:none}
#c{width:100%;height:100%;display:block}
#ui{position:fixed;top:0;left:0;right:0;padding:15px;background:linear-gradient(180deg,rgba(0,0,0,0.8),transparent);z-index:10;font-size:14px;color:#00d4ff;font-weight:bold;text-align:center}
#tip{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);padding:10px 20px;border-radius:20px;color:#888;font-size:12px}
#mini{position:fixed;bottom:20px;right:20px;width:70px;height:70px;background:rgba(0,0,0,0.8);border:2px solid #00d4ff;border-radius:8px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">🏙️ 哈尔滨3D - 触摸摇杆移动</div>
<div id="tip">左下角摇杆移动 | 右下角缩放</div>
<div id="mini"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a1520);
scene.fog=new THREE.Fog(0x0a1520,50,400);
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0x404060,0.6));
const sun=new THREE.DirectionalLight(0xffd4a0,1);
sun.position.set(50,100,50);
scene.add(sun);

const ground=new THREE.Mesh(new THREE.PlaneGeometry(600,600),new THREE.MeshStandardMaterial({color:0x1a2530}));
ground.rotation.x=-Math.PI/2;
scene.add(ground);
scene.add(new THREE.GridHelper(600,60,0x2a3a4a,0x1a2530));

const buildings=[
{x:-40,z:-60,w:30,h:55,d:25,c:0xd4c4a8},{x:-20,z:-40,w:35,h:85,d:25,c:0x2a3a4a},{x:10,z:-30,w:30,h:70,d:22,c:0x3a2a1a},{x:50,z:-80,w:45,h:75,d:35,c:0x8a5a4a},{x:70,z:-90,w:38,h:100,d:30,c:0x2a3a4a},{x:0,z:80,w:25,h:30,d:25,c:0x8a6a5a},{x:-150,z:50,w:50,h:40,d:35,c:0x3a4a5a},{x:-180,z:30,w:35,h:90,d:28,c:0x1a3a5a},{x:-120,z:70,w:40,h:110,d:32,c:0x2a3a4a},{x:100,z:-20,w:25,h:200,d:25,c:0xc9a86c},{x:80,z:-10,w:35,h:90,d:28,c:0x3a4a5a},{x:60,z:-5,w:42,h:130,d:35,c:0x2a3a4a},{x:220,z:-120,w:160,h:50,d:90,c:0x4a5a6a},{x:190,z:-150,w:80,h:70,d:60,c:0x8a3a4a},{x:-80,z:180,w:350,h:8,d:250,c:0x2a6a3a},{x:-250,z:-50,w:150,h:45,d:100,c:0x3a4a5a}
];
buildings.forEach(b=>{
const mesh=new THREE.Mesh(new THREE.BoxGeometry(b.w,b.h,b.d),new THREE.MeshStandardMaterial({color:b.c,metalness:0.2,roughness:0.7}));
mesh.position.set(b.x,b.h/2,b.z);
mesh.castShadow=true;
scene.add(mesh);
});

let px=0,pz=0,py=2,yaw=0;
const joystick=document.createElement('div');
joystick.style.cssText='position:fixed;bottom:20px;left:20px;width:80px;height:80px;background:rgba(255,255,255,0.08);border:2px solid rgba(0,200,255,0.35);border-radius:50%;z-index:10';
const knob=document.createElement('div');
knob.style.cssText='width:30px;height:30px;background:linear-gradient(135deg,#00d4ff,#006688);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)';
joystick.appendChild(knob);
document.body.appendChild(joystick);

let jx=0,jy=0,touch=false;
joystick.addEventListener('touchstart',e=>{touch=true;e.preventDefault()});
joystick.addEventListener('touchmove',e=>{
if(!touch)return;
const t=e.touches[0],r=joystick.getBoundingClientRect();
let dx=t.clientX-r.left-40,dy=t.clientY-r.top-40;
const d=Math.min(30,Math.sqrt(dx*dx+dy*dy)),a=Math.atan2(dy,dx);
jx=Math.cos(a)*d/30;jy=Math.sin(a)*d/30;
knob.style.transform=`translate(calc(-50%+${jx*25}px),calc(-50%+${jy*25}px))`;
e.preventDefault();
});
joystick.addEventListener('touchend',()=>{touch=false;jx=0;jy=0;knob.style.transform='translate(-50%,-50%)'});

const zin=document.createElement('div');
zin.textContent='+';zin.style.cssText='position:fixed;bottom:20px;right:20px;width:40px;height:40px;background:rgba(0,200,255,0.15);border:2px solid #00d4ff;border-radius:8px;color:#00d4ff;font-size:20px;display:flex;align-items:center;justify-content:center;z-index:10';
const zout=zin.cloneNode();zout.textContent='-';zout.style.bottom='70px';
document.body.appendChild(zin);document.body.appendChild(zout);
zin.ontouchstart=()=>camera.zoom=Math.min(2,camera.zoom+0.1);
zout.ontouchstart=()=>camera.zoom=Math.max(0.5,camera.zoom-0.1);

function animate(){
px+=jx*0.5;pz+=jy*0.5;
px=Math.max(-250,Math.min(250,px));pz=Math.max(-250,Math.min(250,pz));
camera.position.set(px,py,pz);
camera.rotation.y=yaw;
renderer.render(scene,camera);
requestAnimationFrame(animate);
}animate();
window.onresize=()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)};
</script>
</body>
</html>
