<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏙️ 哈尔滨3D城市</title>
<style>
* {margin:0;padding:0;box-sizing:border-box}
body {font-family:'Microsoft YaHei',sans-serif;background:#0a0f14;color:#fff;overflow:hidden}
#game {position:fixed;inset:0;perspective:800px;background:linear-gradient(180deg,#0a1520,#1a2530)}
#city {position:absolute;width:100%;height:100%;transform-style:preserve-3d;transform:rotateX(60deg) translateZ(-100px)}
.floor {position:absolute;width:600px;height:600px;left:50%;top:50%;transform:translate(-50%,-50%);background:linear-gradient(180deg,#0d1520,#152030);border:2px solid #1a3a4a;border-radius:10px}
.grid {position:absolute;inset:0;background-image:linear-gradient(#1a3a4a 1px,transparent 1px),linear-gradient(90deg,#1a3a4a 1px,transparent 1px);background-size:30px 30px}
.b {position:absolute;transform-style:preserve-3d}
.b::before {content:'';position:absolute;bottom:-8px;left:0;right:0;height:8px;background:inherit;filter:brightness(0.5);transform:rotateX(-90deg);transform-origin:top}
.b::after {content:'';position:absolute;top:0;right:-6px;width:6px;height:100%;background:inherit;filter:brightness(0.6);transform:rotateY(-90deg);transform-origin:left}
.road {position:absolute;background:#222;height:8px;left:50%;transform:translateX(-50%)}
.road-v {width:8px;height:400px;top:50%;transform:translateY(-50%)}
#ui {position:fixed;top:0;left:0;right:0;padding:15px;background:linear-gradient(180deg,rgba(0,0,0,0.8),transparent);z-index:100;display:flex;justify-content:space-between}
.title {font-size:18px;font-weight:bold;color:#00d4ff}
.info {position:fixed;bottom:20px;left:20px;background:rgba(0,0,0,0.7);padding:12px;border-radius:8px;font-size:12px;color:#888;z-index:100}
.info k {color:#00d4ff}
#mini {position:fixed;bottom:20px;right:20px;width:120px;height:120px;background:rgba(0,0,0,0.7);border:2px solid #00d4ff;border-radius:8px;z-index:100;overflow:hidden}
#player {position:absolute;width:10px;height:10px;background:#00ff88;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px #00ff88}
</style>
</head>
<body>
<div id="game">
<div id="city">
<div class="floor"><div class="grid"></div></div>
</div>
</div>
<div id="ui"><div class="title">🏙️ 哈尔滨3D城市</div></div>
<div class="info">
<k>WASD</k> 移动 &nbsp; <k>鼠标</k> 视角<br>
点击画面锁定鼠标
</div>
<div id="mini"><div id="player"></div></div>

<script>
const buildings = [
{x:-40,z:-60,w:30,h:50,c:'#d4c4a8',n:'索菲亚教堂'},
{x:-20,z:-40,w:35,h:85,c:'#2a3a4a',n:'曼哈顿商厦'},
{x:10,z:-30,w:30,h:70,c:'#3a2a1a',n:'金安欧罗巴'},
{x:50,z:-80,w:45,h:75,c:'#8a5a4a',n:'秋林公司'},
{x:70,z:-90,w:38,h:100,c:'#2a3a4a',n:'秋林国际'},
{x:100,z:-20,w:25,h:180,c:'#c9a86c',n:'龙塔'},
{x:-150,z:50,w:50,h:40,c:'#3a4a5a',n:'群力政府'},
{x:-180,z:30,w:35,h:90,c:'#1a3a5a',n:'哈尔滨银行'},
{x:220,z:-120,w:160,h:50,c:'#4a5a6a',n:'哈尔滨西站'},
{x:190,z:-150,w:80,h:70,c:'#8a3a4a',n:'万达广场'},
{x:80,z:-10,w:35,h:90,c:'#3a4a5a',n:'长江大厦'},
{x:60,z:-5,w:42,h:130,c:'#2a3a4a',n:'华润大厦'},
{x:0,z:80,w:25,h:30,c:'#8a6a5a',n:'防洪纪念塔'},
];

const city = document.getElementById('city');
const mini = document.getElementById('mini');
const player = document.getElementById('player');

buildings.forEach(b=>{
const el = document.createElement('div');
el.className = 'b';
el.style.cssText = `width:${b.w}px;height:${b.h}px;left:${300+b.x-b.w/2}px;top:${300+b.z-b.h/2}px;background:${b.c}`;
el.title = b.n;
city.appendChild(el);
});

const roads = [
{h:8,w:400,z:0,x:0},{h:400,w:8,z:0,x:0},{h:8,w:300,z:-80,x:0},{h:300,w:8,z:-40,x:0},{h:8,w:250,z:70,x:0},{h:250,w:8,z:100,x:0},{h:8,w:200,z:-120,x:0},{h:200,w:8,z:60,x:0}
];
roads.forEach(r=>{
const el = document.createElement('div');
el.className = r.w>r.h ? 'road' : 'road road-v';
el.style.cssText = r.w>r.h ? `width:${r.w}px;top:${300+r.z}px` : `height:${r.h}px;left:${300+r.x}px`;
city.appendChild(el);
});

let px=0,pz=0,rot=0;
let keys={};
document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
document.addEventListener('mousemove',e=>{if(document.pointerLockElement)rot-=e.movementX*0.005});
document.addEventListener('click',()=>document.body.requestPointerLock());

function update(){
const s = keys.shift?4:2;
if(keys.w){px+=Math.sin(rot)*s;pz+=Math.cos(rot)*s}
if(keys.s){px-=Math.sin(rot)*s;pz-=Math.cos(rot)*s}
if(keys.a){px+=Math.cos(rot)*s;pz-=Math.sin(rot)*s}
if(keys.d){px-=Math.cos(rot)*s;pz+=Math.sin(rot)*s}
px=Math.max(-250,Math.min(250,px));pz=Math.max(-250,Math.min(250,pz));
city.style.transform = `rotateX(60deg) translateZ(-100px) rotateY(${rot*180/Math.PI}deg) translateX(${-px}px) translateZ(${-pz}px)`;
player.style.left = (60+px/5)+'px';player.style.top = (60+pz/5)+'px';
requestAnimationFrame(update);
}update();
</script>
</body>
</html>
