<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哈尔滨立体战术地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:none}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0f14;color:#fff;user-select:none}
.c{flex-direction:column;display:flex;height:100vh;background:linear-gradient(180deg,#050810 0%,#0a0f14 50%,#0d1520)}
.h{flex-direction:row;justify-content:space-between;align-items:center;display:flex;padding:8px 16px;background:linear-gradient(90deg,#1a1a2e,#0d1117);border-bottom:2px solid #ff6b00;box-shadow:0 2px 20px rgba(255,107,0,0.3)}
.l{font-size:16px;font-weight:bold;background:linear-gradient(90deg,#ff6b00,#ffcc00,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.s{display:flex;align-items:center;gap:6px}
.o{width:8px;height:8px;background:#00ff88;border-radius:50%;box-shadow:0 0 10px #00ff88;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.t{font-family:monospace;color:#ff6b00;font-size:12px}
.m{flex:1;position:relative;background:#050810;overflow:auto;display:flex;align-items:center;justify-content:center;perspective:800px}

/* 立体地图容器 */
.map-container{position:relative;width:500px;height:500px;max-width:95vw;max-height:70vh;transform:rotateX(20deg);transform-style:preserve-3d}

/* 地图底板 */
.map-base{position:absolute;inset:0;background:linear-gradient(180deg,#0a1520,#0d1a28);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5);transform:translateZ(-20px)}

/* 网格 */
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,107,0,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,0,0.08) 1px,transparent 1px);background-size:25px 25px;transform:translateZ(0)}

/* 立体建筑 */
.b3d{position:absolute;transform-style:preserve-3d}
.b3d::before{content:'';position:absolute;bottom:-8px;left:0;right:0;height:8px;background:inherit;filter:brightness(0.5);transform:rotateX(-90deg);transform-origin:top}
.b3d::after{content:'';position:absolute;top:0;right:-6px;width:6px;height:100%;background:inherit;filter:brightness(0.7);transform:rotateY(-90deg);transform-origin:left}

/* 建筑颜色 */
.b1{background:linear-gradient(180deg,#ff6b00,#cc4400)}
.b2{background:linear-gradient(180deg,#ffcc00,#cc9900)}
.b3{background:linear-gradient(180deg,#22c55e,#15803d)}
.b4{background:linear-gradient(180deg,#00d4ff,#0066aa)}
.b5{background:linear-gradient(180deg,#a371f7,#7c3aed)}
.b6{background:linear-gradient(180deg,#ec4899,#be185d)}
.b7{background:linear-gradient(180deg,#14b8a6,#0f766e)}
.b8{background:linear-gradient(180deg,#f97316,#c2410c)}

/* 立体地标 */
.lm3d{position:absolute;width:24px;height:24px;transform-style:preserve-3d}
.lm3d::before{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:10px solid rgba(255,107,0,0.5);transform-origin:top}
.lm3d::after{content:'';position:absolute;width:24px;height:24px;background:rgba(255,107,0,0.9);border:2px solid #fff;border-radius:50%;box-shadow:0 0 20px rgba(255,107,0,0.8);animation:ping 2s infinite}
@keyframes ping{0%{transform:scale(0.9);opacity:1}100%{transform:scale(1.4);opacity:0}}

/* 立体河流 */
.river3d{position:absolute;background:linear-gradient(180deg,rgba(0,100,200,0.4),rgba(0,150,255,0.6));border-radius:20px;transform:rotate(-10deg) translateZ(-5px);box-shadow:0 5px 20px rgba(0,100,200,0.3)}

/* 立体公园 */
.park3d{position:absolute;background:rgba(0,200,100,0.1);border-radius:10px;border:2px solid rgba(0,255,136,0.4);transform:translateZ(-2px)}

/* 安全区 - 立体光晕 */
.zone-safe{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(0,255,136,0.2),transparent 70%);border:2px solid rgba(0,255,136,0.6);transform:translateZ(5px);box-shadow:0 0 30px rgba(0,255,136,0.3),inset 0 0 30px rgba(0,255,136,0.1)}

/* 危险区 */
.zone-danger{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,0,0,0.15),transparent 70%);border:2px dashed rgba(255,0,0,0.5);transform:translateZ(3px);box-shadow:0 0 20px rgba(255,0,0,0.2)}

/* 空投区 */
.zone-drop{position:absolute;border-radius:30%;background:rgba(255,107,0,0.15);border:2px solid #ff6b00;transform:translateZ(8px);box-shadow:0 0 25px rgba(255,107,0,0.4)}

/* 立体街道 */
.street{position:absolute;background:rgba(255,255,255,0.06);transform:translateZ(0)}
.street-main{height:6px;background:rgba(255,255,255,0.12)}
.street-main-v{width:6px}

/* 航线 - 立体线 */
.flight-line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,rgba(255,204,0,0.8),transparent);transform:translateZ(10px);box-shadow:0 0 10px rgba(255,204,0,0.5)}

/* 立体飞机 */
.uav3d{position:absolute;width:20px;height:20px;transform-style:preserve-3d}
.uav3d::before{content:'';position:absolute;width:20px;height:20px;background:linear-gradient(135deg,#00ff88,#00d4ff);border-radius:50%;border:2px solid #fff;box-shadow:0 0 20px rgba(0,255,136,0.9)}
.uav3d::after{content:'';position:absolute;width:30px;height:30px;border:1px solid rgba(0,255,136,0.5);border-radius:50%;transform:translateZ(-5px);animation:rip 2s infinite}
@keyframes rip{0%{transform:scale(0.8);opacity:1}100%{transform:scale(1.5);opacity:0}}

/* 玩家位置 - 3D */
.player3d{position:absolute;width:30px;height:30px;transform-style:preserve-3d}
.player3d::before{content:'';position:absolute;width:30px;height:30px;background:rgba(255,0,0,0.9);border:3px solid #fff;border-radius:50%;box-shadow:0 0 25px rgba(255,0,0,0.8)}
.player3d::after{content:'';position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:12px solid #fff;transform:translateZ(10px)}

/* 罗盘 */
.compass{position:absolute;top:-40px;left:50%;transform:translateX(-50%) translateZ(20px);width:120px;height:35px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:bold}
.compass span{color:#ffcc00;text-shadow:0 0 10px rgba(255,204,0,0.8)}

/* 坐标 */
.coord{position:absolute;font-size:9px;color:rgba(255,255,255,0.5);font-family:monospace;transform:translateZ(5px)}

/* 图例 */
.legend{position:absolute;bottom:10px;left:10px;background:rgba(10,15,20,0.95);border:1px solid #ff6b00;border-radius:10px;padding:10px;font-size:10px;transform:translateZ(15px)}
.legend-title{color:#ff6b00;font-weight:bold;margin-bottom:6px}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.legend-box{width:12px;height:12px;border-radius:3px}

/* 统计面板 */
.stats{position:absolute;top:10px;right:10px;background:rgba(10,15,20,0.95);border:1px solid #ff6b00;border-radius:10px;padding:12px;min-width:130px;transform:translateZ(15px)}
.stats-title{color:#ff6b00;font-weight:bold;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(255,107,0,0.3)}
.stats-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px}
.stats-row .l{color:#888}
.stats-row .v{color:#00ff88;font-weight:bold}

/* 缩放按钮 */
.zoom{position:absolute;bottom:10px;right:10px;display:flex;flex-direction:column;gap:5px;transform:translateZ(20px)}
.zoom button{width:40px;height:40px;background:rgba(255,107,0,0.2);border:2px solid #ff6b00;border-radius:10px;color:#ff6b00;font-size:20px;font-weight:bold;cursor:pointer;transition:all 0.2s}
.zoom button:active{background:rgba(255,107,0,0.5);transform:scale(0.95)}

/* 底部 */
.f{justify-content:space-around;display:flex;padding:8px 16px;background:linear-gradient(90deg,#1a1a2e,#0d1117);border-top:2px solid #ff6b00}
.fi{display:flex;gap:6px;font-size:11px}
.fi .l{color:#ff6b00}
.fi .v{color:#00ff88}

/* 提示 */
.tip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) translateZ(30px);background:rgba(0,0,0,0.8);padding:15px 25px;border-radius:10px;border:2px solid #ff6b00;font-size:14px;animation:fade 3s forwards;pointer-events:none}
@keyframes fade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div class=c>
<div class=h><div class=l>🎮 哈尔滨立体战术地图</div><div class=s><div class=o></div><span style=color:#00ff88;font-size:10px>在线</span></div><div class=t id=T>00:00</div></div>
<div class=m id=map>
<div class=map-container>
<!-- 罗盘 -->
<div class=compass><span>W</span><span style=margin-left:30px>N</span><span style=margin-left:30px>E</span><span style=margin-left:30px>S</span></div>

<div class=map-base></div>
<div class=grid></div>

<!-- 街道 -->
<div class="street street-main" style="top:20%;left:3%;width:94%"></div>
<div class="street street-main" style="top:40%;left:3%;width:94%"></div>
<div class="street street-main" style="top:60%;left:3%;width:94%"></div>
<div class="street street-main" style="top:80%;left:3%;width:94%"></div>
<div class="street street-main-v" style="left:20%;top:3%;height:94%"></div>
<div class="street street-main-v" style="left:40%;top:3%;height:94%"></div>
<div class="street street-main-v" style="left:60%;top:3%;height:94%"></div>
<div class="street street-main-v" style="left:80%;top:3%;height:94%"></div>

<!-- 区域 -->
<div class="zone-safe" style="left:25%;top:20%;width:50%;height:55%"></div>
<div class="zone-danger" style="left:5%;top:5%;width:25%;height:30%"></div>
<div class="zone-drop" style="left:55%;top:45%;width:25%;height:30%"></div>

<!-- 河流 -->
<div class=river3d style="left:12%;top:12%;width:22%;height:38%"></div>
<div class=river3d style="left:52%;top:52%;width:18%;height:25%"></div>

<!-- 公园 -->
<div class=park3d style="left:3%;top:62%;width:12%;height:12%"></div>
<div class=park3d style="left:68%;top:8%;width:12%;height:14%"></div>
<div class=park3d style="left:32%;top:68%;width:14%;height:12%"></div>

<!-- 立体建筑群 -->
<div class="b3d b1" style="left:8%;top:22%;width:18px;height:45px;transform:translateZ(0)"></div>
<div class="b3d b2" style="left:14%;top:32%;width:14px;height:50px;transform:translateZ(0)"></div>
<div class="b3d b3" style="left:22%;top:12%;width:20px;height:60px;transform:translateZ(0)"></div>
<div class="b3d b4" style="left:32%;top:22%;width:16px;height:55px;transform:translateZ(0)"></div>
<div class="b3d b5" style="left:42%;top:8%;width:18px;height:70px;transform:translateZ(0)"></div>
<div class="b3d b6" style="left:52%;top:18%;width:16px;height:58px;transform:translateZ(0)"></div>
<div class="b3d b7" style="left:62%;top:28%;width:14px;height:48px;transform:translateZ(0)"></div>
<div class="b3d b8" style="left:72%;top:12%;width:19px;height:62px;transform:translateZ(0)"></div>
<div class="b3d b1" style="left:82%;top:22%;width:15px;height:45px;transform:translateZ(0)"></div>

<div class="b3d b3" style="left:10%;top:52%;width:15px;height:42px;transform:translateZ(0)"></div>
<div class="b3d b4" style="left:18%;top:62%;width:17px;height:48px;transform:translateZ(0)"></div>
<div class="b3d b5" style="left:28%;top:48%;width:14px;height:40px;transform:translateZ(0)"></div>
<div class="b3d b6" style="left:38%;top:58%;width:18px;height:52px;transform:translateZ(0)"></div>
<div class="b3d b7" style="left:48%;top:52%;width:15px;height:45px;transform:translateZ(0)"></div>
<div class="b3d b8" style="left:58%;top:62%;width:16px;height:50px;transform:translateZ(0)"></div>
<div class="b3d b1" style="left:68%;top:48%;width:14px;height:42px;transform:translateZ(0)"></div>
<div class="b3d b2" style="left:78%;top:58%;width:17px;height:48px;transform:translateZ(0)"></div>

<div class="b3d b4" style="left:5%;top:78%;width:12px;height:30px;transform:translateZ(0)"></div>
<div class="b3d b5" style="left:20%;top:82%;width:14px;height:35px;transform:translateZ(0)"></div>
<div class="b3d b6" style="left:35%;top:78%;width:16px;height:38px;transform:translateZ(0)"></div>
<div class="b3d b7" style="left:50%;top:82%;width:13px;height:32px;transform:translateZ(0)"></div>
<div class="b3d b8" style="left:65%;top:80%;width:15px;height:35px;transform:translateZ(0)"></div>
<div class="b3d b1" style="left:80%;top:78%;width:14px;height:30px;transform:translateZ(0)"></div>

<!-- 地标 -->
<div class=lm3d style="left:25%;top:30%"></div>
<div class=lm3d style="left:45%;top:18%"></div>
<div class=lm3d style="left:68%;top:38%"></div>
<div class=lm3d style="left:35%;top:58%"></div>
<div class=lm3d style="left:58%;top:68%"></div>
<div class=lm3d style="left:15%;top:72%"></div>

<!-- 坐标 -->
<div class=coord style="left:3%;top:3%">0,0</div>
<div class=coord style="right:3%;top:3%">100,0</div>
<div class=coord style="left:3%;bottom:3%">0,100</div>
<div class=coord style="right:3%;bottom:3%">100,100</div>

<!-- 航线 -->
<svg style="position:absolute;top:25%;left:3%;width:94%;height:50%;transform:translateZ(10px)"><path d="M 5 85 Q 30 60 50 55 Q 70 50 95 20" stroke="#ffcc00" stroke-width="2" fill="none" stroke-dasharray="8 4" opacity="0.7"/></svg>

<!-- 玩家位置 -->
<div class=player3d style="left:48%;top:48%"></div>

<!-- 飞机容器 -->
<div id=planes-container></div>

<!-- 提示 -->
<div class=tip>🎮 立体战术地图 - 100架飞机</div>

<!-- 图例 -->
<div class=legend>
<div class=legend-title>图例</div>
<div class=legend-item><span class=legend-box style=background:rgba(0,255,136,0.3);border:1px solid #00ff88></span><span>安全区</span></div>
<div class=legend-item><span class=legend-box style=background:rgba(255,0,0,0.2);border:1px dashed #f00></span><span>危险区</span></div>
<div class=legend-item><span class=legend-box style=background:rgba(255,107,0,0.3);border:1px solid #ff6b00></span><span>空投区</span></div>
<div class=legend-item><span class=legend-box style=background:#f00;border-radius:50%></span><span>玩家</span></div>
</div>

<!-- 统计 -->
<div class=stats>
<div class=stats-title>📡 飞行状态</div>
<div class=stats-row><span class=l>飞行器:</span><span class=v id=ac>0</span></div>
<div class=stats-row><span class=l>高度:</span><span class=v id=aa>0m</span></div>
<div class=stats-row><span class=l>速度:</span><span class=v id=as>0km/h</span></div>
<div class=stats-row><span class=l>坐标:</span><span class=v id=coord>50,50</span></div>
</div>

<!-- 缩放 -->
<div class=zoom>
<button onclick="zoomIn()">+</button>
<button onclick="zoomOut()">−</button>
</div>
</div>
</div>

<div class=f><div class=fi><span class=l>📍:</span><span class=v id=fa>0</span></div><div class=fi><span class=l>🚁:</span><span class=v id=ff>0</span></div><div class=fi><span class=l>📶:</span><span class=v style=color:#00ff88>强</span></div></div>
</div>

<script>
const PLANE_COUNT = 100;
const planes = [];
const colors = ['#00ff88','#00d4ff','#ff6b00','#a371f7','#22c55e','#ffcc00','#ec4899','#14b8a6'];
const container = document.getElementById('planes-container');

for(let i=1;i<=PLANE_COUNT;i++){
    const el = document.createElement('div');
    el.className = 'uav3d';
    const startX = 5 + Math.random()*15;
    const startY = 35 + Math.random()*40;
    const endX = 75 + Math.random()*18;
    const endY = 20 + Math.random()*30;
    const color = colors[i % colors.length];
    el.style.left = startX+'%';
    el.style.top = startY+'%';
    el.style.filter = `drop-shadow(0 0 8px ${color})`;
    container.appendChild(el);
    
    planes.push({
        el: el,
        start: {x:startX,y:startY},
        end: {x:endX,y:endY},
        alt: 300 + Math.random()*500,
        speed: 40 + Math.random()*40,
        progress: Math.random()
    });
}

let F=false,Pf=false,Ani,scale=1;
function startAll(){
    if(F&&!Pf)return;
    F=true;Pf=false;
    Ani=setInterval(update,50);
}
function pauseAll(){Pf=!Pf}
function resetAll(){
    F=false;clearInterval(Ani);
    planes.forEach(p=>{p.progress=Math.random();p.el.style.left=p.start.x+'%';p.el.style.top=p.start.y+'%'});
}
function update(){
    if(!F||Pf)return;
    planes.forEach(p=>{
        p.progress+=0.001;
        if(p.progress>1)p.progress=0;
        const x=p.start.x+(p.end.x-p.start.x)*p.progress;
        const y=p.start.y+(p.end.y-p.start.y)*p.progress+Math.sin(p.progress*Math.PI)*8;
        p.el.style.left=x+'%';
        p.el.style.top=y+'%';
    });
    const avgAlt=Math.round(planes.reduce((s,p)=>s+p.alt,0)/PLANE_COUNT);
    document.getElementById('ac').textContent=PLANE_COUNT;
    document.getElementById('aa').textContent=avgAlt+'m';
    document.getElementById('as').textContent=Math.round(40+Math.random()*40)+'km/h';
    document.getElementById('fa').textContent=PLANE_COUNT;
    document.getElementById('ff').textContent=Math.floor(Math.random()*200)+100;
}
function zoomIn(){scale=Math.min(scale+0.2,2);document.querySelector('.map-container').style.transform=`rotateX(20deg) scale(${scale})`}
function zoomOut(){scale=Math.max(scale-0.2,0.5);document.querySelector('.map-container').style.transform=`rotateX(20deg) scale(${scale})`}
function T(){
    const n=new Date,h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0');
    document.getElementById('T').textContent=h+':'+m;
}
setInterval(T,1000);T();
setTimeout(startAll,500);
</script>
</body>
</html>
