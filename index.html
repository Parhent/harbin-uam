<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏙️ 哈尔滨3D开放世界</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#87CEEB;touch-action:none}
#c{width:100%;height:100%;display:block}
#ui{position:fixed;top:0;left:0;right:0;padding:12px;background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);z-index:10;font-size:14px;color:#fff;font-weight:bold;text-align:center;text-shadow:1px 1px 2px #000}
#tip{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);padding:8px 16px;border-radius:15px;color:#ddd;font-size:11px}
#joy{position:fixed;bottom:25px;left:25px;width:80px;height:80px;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.3);border-radius:50%;z-index:10}
#knob{width:32px;height:32px;background:linear-gradient(135deg,#00ff88,#00aa55);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(0,255,136,0.5)}
#zoom{position:fixed;bottom:25px;right:25px;z-index:10;display:flex;flex-direction:column;gap:8px}
.zbtn{width:38px;height:38px;background:rgba(255,255,255,0.15);border:2px solid #fff;border-radius:8px;color:#fff;font-size:18px;font-weight:bold;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">🏙️ 哈尔滨3D开放世界</div>
<div id="tip">左下角摇杆移动 | 右下角缩放</div>
<div id="joy"><div id="knob"></div></div>
<div id="zoom"><div class="zbtn" id="zi">+</div><div class="zbtn" id="zo">-</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x5ba3d0);
scene.fog=new THREE.Fog(0x5ba3d0,100,500);

const camera=new THREE.PerspectiveCamera(80,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,8,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

// 天空
scene.add(new THREE.AmbientLight(0x87CEEB,0.6));
const sun=new THREE.DirectionalLight(0xffffee,1.2);
sun.position.set(100,150,50);
sun.castShadow=true;
sun.shadow.mapSize.width=2048;
sun.shadow.mapSize.height=2048;
sun.shadow.camera.left=-200;
sun.shadow.camera.right=200;
sun.shadow.camera.top=200;
sun.shadow.camera.bottom=-200;
scene.add(sun);

// 地面 - 草地
const grassMat=new THREE.MeshStandardMaterial({color:0x4a7c3f,roughness:0.9});
const ground=new THREE.Mesh(new THREE.PlaneGeometry(800,800),grassMat);
ground.rotation.x=-Math.PI/2;
ground.receiveShadow=true;
scene.add(ground);

// 道路
const roadMat=new THREE.MeshStandardMaterial({color:0x3a3a3a,roughness:0.95});
const roads=[
{z:0,w:500,h:12},{x:0,w:12,h:500},{z:-80,w:400,h:10},{z:80,w:350,h:10},{z:-120,w:300,h:8},{x:80,w:8,h:350},{x:-80,w:8,h:300}
];
roads.forEach(r=>{
const road=new THREE.Mesh(new THREE.PlaneGeometry(r.w,r.h),roadMat);
road.rotation.x=-Math.PI/2;
road.position.set(r.x||0,0.05,r.z||0);
road.receiveShadow=true;
scene.add(road);
// 路肩
const curb=new THREE.Mesh(new THREE.BoxGeometry(r.w,0.1,0.3),new THREE.MeshStandardMaterial({color:0xffffff}));
curb.position.set(r.x||0,0.1,(r.z||0)-r.h/2-0.5);
scene.add(curb);
});

// 建筑
const buildings=[
{x:-40,z:-60,w:35,h:60,d:30,c:0xd4c4a8,n:'索菲亚'},{x:-20,z:-40,w:40,h:90,d:35,c:0x4a5a6a,n:'商厦'},{x:10,z:-30,w:32,h:75,d:28,c:0x5a4a3a,n:'商场'},
{x:50,z:-80,w:50,h:80,d:40,c:0x8a5a4a,n:'秋林'},{x:70,z:-90,w:45,h:110,d:35,c:0x3a4a5a,n:'秋林国际'},
{x:0,z:80,w:30,h:35,d:30,c:0x8a6a5a,n:'纪念塔'},{x:-150,z:50,w:55,h:45,d:40,c:0x4a5a6a,n:'政府'},
{x:-180,z:30,w:40,h:100,d:30,c:0x2a4a6a,n:'银行'},{x:-120,z:70,w:45,h:120,d:35,c:0x3a5a6a,n:'盛和'},
{x:100,z:-20,w:28,h:220,d:28,c:0xc9a86c,n:'龙塔'},{x:80,z:-10,w:40,h:95,d:32,c:0x4a5a6a,n:'大厦'},
{x:60,z:-5,w:48,h:140,d:38,c:0x3a4a5a,n:'华润'},{x:220,z:-120,w:170,h:55,d:95,c:0x5a5a6a,n:'西站'},
{x:190,z:-150,w:90,h:75,d:65,c:0x8a3a4a,n:'万达'},{x:-80,z:180,w:380,h:10,d:260,c:0x3a6a3a,n:'太阳岛'},
{x:-250,z:-50,w:160,h:50,d:110,c:0x4a5a5a,n:'科技园'},{x:-280,z:-30,w:48,h:70,d:40,c:0x5a6a6a,n:'大厦1'},
{x:40,z:20,w:42,h:110,d:35,c:0x4a5a6a,n:'东盛'},{x:25,z:5,w:35,h:85,d:28,c:0x5a4a5a,n:'烟草'},
];
buildings.forEach(b=>{
const mat=new THREE.MeshStandardMaterial({color:b.c,metalness:0.15,roughness:0.75});
const mesh=new THREE.Mesh(new THREE.BoxGeometry(b.w,b.h,b.d),mat);
mesh.position.set(b.x,b.h/2,b.z);
mesh.castShadow=true;
mesh.receiveShadow=true;
scene.add(mesh);
// 窗户
if(b.h>40){
const winMat=new THREE.MeshStandardMaterial({color:0xffffaa,emissive:0xffffaa,emissiveIntensity:0.3});
for(let wy=b.h*0.2;wy<b.h*0.9;wy+=b.h*0.25){
for(let wx=-b.w*0.3;wx<=b.w*0.3;wx+=b.w*0.25){
const win=new THREE.Mesh(new THREE.BoxGeometry(b.w*0.15,b.h*0.12,b.d*0.05),winMat);
win.position.set(b.x+wx,wy,b.z+b.d/2+0.1);
scene.add(win);
}}
}
});

// 树木
const treeMat=new THREE.MeshStandardMaterial({color:0x2d5a2d});
const trunkMat=new THREE.MeshStandardMaterial({color:0x5a4030});
for(let i=0;i<60;i++){
const x=(Math.random()-0.5)*600;
const z=(Math.random()-0.5)*600;
if(Math.abs(x)<30&&Math.abs(z)<30)continue;
const h=3+Math.random()*4;
const tree=new THREE.Mesh(new THREE.ConeGeometry(2+h*0.3,h,6),treeMat);
tree.position.set(x,h/2,z);
tree.castShadow=true;
scene.add(tree);
const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,h*0.3,6),trunkMat);
trunk.position.set(x,h*0.15,z);
scene.add(trunk);
}

// 小型建筑
for(let i=0;i<30;i++){
const x=(Math.random()-0.5)*500;
const z=(Math.random()-0.5)*500;
if(Math.abs(x)<50&&Math.abs(z)<50)continue;
const w=5+Math.random()*10;
const h=3+Math.random()*8;
const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,w),new THREE.MeshStandardMaterial({color:0x6a5a4a+Math.floor(Math.random()*0x202020)}));
mesh.position.set(x,h/2,z);
mesh.castShadow=true;
scene.add(mesh);
}

// 玩家控制
let px=0,pz=0,py=8;
const joy=document.getElementById('joy');
const knob=document.getElementById('knob');
let jx=0,jy=0,touch=false;
joy.addEventListener('touchstart',e=>{touch=true;e.preventDefault()});
joy.addEventListener('touchmove',e=>{
if(!touch)return;
const t=e.touches[0],r=joy.getBoundingClientRect();
let dx=t.clientX-r.left-40,dy=t.clientY-r.top-40;
const d=Math.min(32,Math.sqrt(dx*dx+dy*dy)),a=Math.atan2(dy,dx);
jx=Math.cos(a)*d/32;jy=Math.sin(a)*d/32;
knob.style.transform=`translate(calc(-50%+${jx*28px),calc(-50%+${jy*28px))`;
e.preventDefault();
});
joy.addEventListener('touchend',()=>{touch=false;jx=0;jy=0;knob.style.transform='translate(-50%,-50%)'});

document.getElementById('zi').ontouchstart=()=>{camera.zoom=Math.min(2,camera.zoom+0.1);camera.updateProjectionMatrix()};
document.getElementById('zo').ontouchstart=()=>{camera.zoom=Math.max(0.5,camera.zoom-0.1);camera.updateProjectionMatrix()};

function animate(){
px+=jx*0.8;pz+=jy*0.8;
px=Math.max(-300,Math.min(300,px));pz=Math.max(-300,Math.min(300,pz));
camera.position.set(px,py,pz);
camera.rotation.y=0;
renderer.render(scene,camera);
requestAnimationFrame(animate);
}animate();
window.onresize=()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)};
</script>
</body>
</html>
