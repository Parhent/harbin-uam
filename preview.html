<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈尔滨空中交通 - 模拟图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f35 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Arial', sans-serif;
            color: #fff;
            padding: 20px;
        }
        .container { width: 100%; max-width: 900px; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
            border-radius: 12px 12px 0 0; margin-bottom: 2px;
        }
        .logo { font-size: 24px; font-weight: bold; background: linear-gradient(90deg,#00d4ff,#7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .status-dot { width: 10px; height: 10px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }
        .time { font-family: monospace; font-size: 18px; color: #00d4ff; }
        
        .map {
            position: relative; height: 500px; background: #0d1220;
            border: 1px solid rgba(0,212,255,0.3); overflow: hidden;
        }
        .map-bg {
            position: absolute; inset: 0;
            background: 
                radial-gradient(circle at 30% 40%, rgba(0,212,255,0.08) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(124,58,237,0.06) 0%, transparent 40%),
                repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(0,212,255,0.05) 50px),
                repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(0,212,255,0.05) 50px);
        }
        
        /* 模拟地图区域 */
        .map-area {
            position: absolute; inset: 30px;
            border: 1px solid rgba(0,212,255,0.2);
        }
        
        /* 路径线 */
        .path {
            position: absolute; top: 45%; left: 25%; width: 50%; height: 30%;
            stroke: #00d4ff; stroke-width: 3; stroke-dasharray: 10 5;
            fill: none; opacity: 0.7;
        }
        
        /* 起点 */
        .start-point {
            position: absolute; top: 60%; left: 25%;
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-radius: 50%; border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0,212,255,0.6);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        
        /* 终点 */
        .end-point {
            position: absolute; top: 35%; left: 72%;
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #ff6b00, #ff3366);
            border-radius: 50%; border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(255,107,0,0.6);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        
        /* eVTOL */
        .evtol {
            position: absolute; top: 48%; left: 45%;
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            border-radius: 50%; border: 3px solid #fff;
            box-shadow: 0 0 30px rgba(0,255,136,0.8);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        /* 标签 */
        .label {
            position: absolute; padding: 4px 10px; background: rgba(0,0,0,0.7);
            border-radius: 4px; font-size: 12px; white-space: nowrap;
        }
        .start-label { top: 66%; left: 20%; }
        .end-label { top: 41%; left: 70%; }
        
        /* 信息面板 */
        .info-panel {
            position: absolute; top: 15px; right: 15px;
            background: rgba(10,20,40,0.9); border: 1px solid rgba(0,212,255,0.3);
            border-radius: 10px; padding: 15px; width: 180px;
        }
        .panel-title { font-size: 14px; font-weight: bold; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(0,212,255,0.3); }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
        .info-row .label-t { color: #8899aa; }
        .info-row .val { color: #00d4ff; font-family: monospace; }
        
        /* 控制面板 */
        .control-panel {
            position: absolute; bottom: 15px; right: 15px;
            background: rgba(10,20,40,0.9); border: 1px solid rgba(0,212,255,0.3);
            border-radius: 10px; padding: 15px;
        }
        .route-info { margin-bottom: 12px; font-size: 12px; }
        .route-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; padding: 6px; background: rgba(0,212,255,0.05); border-radius: 6px; }
        .buttons { display: flex; gap: 8px; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .btn-start { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #000; }
        .btn-pause { background: rgba(124,58,237,0.3); color: #fff; border: 1px solid #7c3aed; }
        
        /* 图例 */
        .legend {
            position: absolute; bottom: 15px; left: 15px;
            background: rgba(10,20,40,0.9); border: 1px solid rgba(0,212,255,0.3);
            border-radius: 10px; padding: 12px;
        }
        .legend-title { font-size: 11px; color: #8899aa; margin-bottom: 8px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; margin-bottom: 4px; }
        .color-box { width: 14px; height: 14px; border-radius: 3px; }
        
        /* 底部 */
        .footer {
            display: flex; justify-content: space-around;
            padding: 12px 20px; background: rgba(10,20,40,0.9);
            border: 1px solid rgba(0,212,255,0.3); border-top: none;
            border-radius: 0 0 12px 12px;
            font-size: 12px;
        }
        .footer-item { display: flex; gap: 6px; }
        .footer-item .lbl { color: #8899aa; }
        .footer-item .v { color: #00d4ff; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🚁 Harbin UAM</div>
            <div class="status"><div class="status-dot"></div><span>系统在线</span></div>
            <div class="time" id="time">15:45:30</div>
        </div>
        
        <div class="map">
            <div class="map-bg"></div>
            <div class="map-area">
                <svg class="path" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M 5 70 Q 30 50 50 55 Q 70 60 95 35" />
                </svg>
                <div class="start-point">🏁</div>
                <div class="end-point">🎭</div>
                <div class="evtol">🚁</div>
                <div class="label start-label">防洪纪念塔</div>
                <div class="label end-label">哈尔滨大剧院</div>
            </div>
            
            <div class="info-panel">
                <div class="panel-title">✈️ 飞行状态</div>
                <div class="info-row"><span class="label-t">飞行器ID:</span><span class="val">EVTOL-001</span></div>
                <div class="info-row"><span class="label-t">当前高度:</span><span class="val">120 m</span></div>
                <div class="info-row"><span class="label-t">飞行速度:</span><span class="val">75 km/h</span></div>
                <div class="info-row"><span class="label-t">剩余里程:</span><span class="val">2.4 km</span></div>
                <div class="info-row"><span class="label-t">状态:</span><span class="val" style="color:#00ff88">巡航中</span></div>
            </div>
            
            <div class="control-panel">
                <div class="route-info">
                    <div class="route-item"><span>🏁</span> 防洪纪念塔 → 哈尔滨大剧院</div>
                </div>
                <div class="buttons">
                    <button class="btn btn-start">▶ 起飞</button>
                    <button class="btn btn-pause">⏸ 暂停</button>
                </div>
            </div>
            
            <div class="legend">
                <div class="legend-title">高度层 (m)</div>
                <div class="legend-item"><span class="color-box" style="background:#00ff88"></span> 低空 (0-100)</div>
                <div class="legend-item"><span class="color-box" style="background:#00aaff"></span> 中空 (100-300)</div>
                <div class="legend-item"><span class="color-box" style="background:#ff6b00"></span> 高空 (300+)</div>
            </div>
        </div>
        
        <div class="footer">
            <div class="footer-item"><span class="lbl">活跃飞行器:</span><span class="v">1</span></div>
            <div class="footer-item"><span class="lbl">今日航班:</span><span class="v">3</span></div>
            <div class="footer-item"><span class="lbl">空域状态:</span><span class="v" style="color:#00ff88">畅通</span></div>
        </div>
    </div>
    
    <script>
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2,'0');
            const m = String(now.getMinutes()).padStart(2,'0');
            const s = String(now.getSeconds()).padStart(2,'0');
            document.getElementById('time').textContent = h + ':' + m + ':' + s;
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
