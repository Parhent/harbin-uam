<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哈尔滨战术地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:none}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0f14;color:#fff;user-select:none}
.c{flex-direction:column;display:flex;height:100vh;background:linear-gradient(180deg,#050810 0%,#0a0f14 50%,#0d1520)}
.h{flex-direction:row;justify-content:space-between;align-items:center;display:flex;padding:8px 16px;background:linear-gradient(90deg,#1a1a2e,#0d1117);border-bottom:2px solid #ff6b00;box-shadow:0 2px 20px rgba(255,107,0,0.3)}
.l{font-size:16px;font-weight:bold;background:linear-gradient(90deg,#ff6b00,#ffcc00,#00ff88);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.s{display:flex;align-items:center;gap:6px}
.o{width:8px;height:8px;background:#00ff88;border-radius:50%;box-shadow:0 0 10px #00ff88;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.t{font-family:monospace;color:#ff6b00;font-size:12px}
.m{flex:1;position:relative;background:#050810;overflow:auto;display:flex;align-items:center;justify-content:center}

/* 战术地图容器 */
.map-container{position:relative;width:500px;height:500px;max-width:95vw;max-height:70vh}

/* 地图背景 */
.map-bg{position:absolute;inset:10px;background:linear-gradient(180deg,#0a1520,#0d1a28);border-radius:8px;overflow:hidden}

/* 网格 */
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,107,0,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,0,0.1) 1px,transparent 1px);background-size:25px 25px}

/* 街道 */
.street{position:absolute;background:rgba(255,255,255,0.05)}
.street-h{height:3px}
.street-v{width:3px}
.main-st{height:5px;background:rgba(255,255,255,0.1)}
.main-st-v{width:5px}

/* 地形区域 */
.zone{position:absolute;border-radius:50%;opacity:0.3}
.zone-safe{background:rgba(0,255,136,0.15);border:2px solid rgba(0,255,136,0.5)}
.zone-danger{background:rgba(255,0,0,0.1);border:2px dashed rgba(255,0,0,0.5)}
.zone-drop{background:rgba(255,107,0,0.2);border:2px solid #ff6b00}

/* 建筑 */
.building{position:absolute;border-radius:2px;opacity:0.8}
.b-orange{background:linear-gradient(180deg,#ff6b00,#cc5500)}
.b-yellow{background:linear-gradient(180deg,#ffcc00,#cc9900)}
.b-green{background:linear-gradient(180deg,#22c55e,#15803d)}
.b-blue{background:linear-gradient(180deg,#00d4ff,#0066aa)}
.b-purple{background:linear-gradient(180deg,#a371f7,#7c3aed)}
.b-pink{background:linear-gradient(180deg,#ec4899,#be185d)}

/* 地标 */
.landmark{position:absolute;width:20px;height:20px;background:rgba(255,107,0,0.8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid #fff;box-shadow:0 0 15px rgba(255,107,0,0.8)}
.landmark::after{content:'';position:absolute;width:30px;height:30px;border:1px solid rgba(255,107,0,0.5);border-radius:50%;animation:ping 2s infinite}
@keyframes ping{0%{transform:scale(0.8);opacity:1}100%{transform:scale(1.5);opacity:0}}

/* 河流 */
.river{position:absolute;background:linear-gradient(90deg,rgba(0,100,200,0.3),rgba(0,150,255,0.5));border-radius:15px;transform:rotate(-10deg)}

/* 公园 */
.park{position:absolute;background:rgba(0,200,100,0.1);border-radius:8px;border:1px solid rgba(0,255,136,0.3)}

/* 航线 */
.flight-path{position:absolute;stroke:#ffcc00;stroke-width:2;stroke-dasharray:8 4;fill:none;opacity:0.7}

/* 飞机 */
.uav{position:absolute;width:16px;height:16px;background:linear-gradient(135deg,#00ff88,#00d4ff);border-radius:50%;border:1.5px solid #fff;z-index:100;box-shadow:0 0 15px rgba(0,255,136,0.8)}
.uav-dot{width:6px;height:6px;background:#fff;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}

/* 玩家位置 */
.player{position:absolute;width:24px;height:24px;background:rgba(255,0,0,0.8);border:2px solid #fff;border-radius:50%;z-index:200;box-shadow:0 0 20px rgba(255,0,0,0.8)}
.player::before{content:'';position:absolute;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:10px solid #fff;top:-12px;left:50%;transform:translateX(-50%)}
.player-dir{position:absolute;width:2px;height:12px;background:#fff;top:-14px;left:50%;transform:translateX(-50%)}

/* 罗盘 */
.compass{position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:100px;height:30px;display:flex;justify-content:space-between;align-items:center;font-size:10px;font-weight:bold;color:#ffcc00}
.compass span{text-shadow:0 0 5px rgba(255,204,0,0.8)}

/* 坐标标签 */
.coord{position:absolute;font-size:8px;color:rgba(255,255,255,0.4);font-family:monospace}

/* 底部信息 */
.f{justify-content:space-around;display:flex;padding:8px 16px;background:linear-gradient(90deg,#1a1a2e,#0d1117);border-top:2px solid #ff6b00}
.fi{display:flex;gap:6px;font-size:11px}
.fi .l{color:#ff6b00}
.fi .v{color:#00ff88}

/* 缩放按钮 */
.zoom{position:absolute;bottom:10px;right:10px;display:flex;flex-direction:column;gap:5px}
.zoom button{width:36px;height:36px;background:rgba(255,107,0,0.2);border:1px solid #ff6b00;border-radius:8px;color:#ff6b00;font-size:18px;cursor:pointer}
.zoom button:active{background:rgba(255,107,0,0.4)}

/* 图例 */
.legend{position:absolute;bottom:10px;left:10px;background:rgba(10,15,20,0.9);border:1px solid #ff6b00;border-radius:8px;padding:8px;font-size:9px}
.legend-item{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.legend-dot{width:8px;height:8px;border-radius:50%}

/* 统计面板 */
.stats{position:absolute;top:10px;right:10px;background:rgba(10,15,20,0.9);border:1px solid #ff6b00;border-radius:8px;padding:10px;min-width:120px}
.stats-title{font-size:11px;color:#ff6b00;font-weight:bold;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(255,107,0,0.3)}
.stats-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:9px}
.stats-row .l{color:#888}
.stats-row .v{color:#00ff88;font-weight:bold}

/* 方向指示器 */
.dir-indicator{position:absolute;top:50%;left:50%;width:300px;height:300px;pointer-events:none;border:1px dashed rgba(255,255,255,0.1);border-radius:50%;transform:translate(-50%,-50%)}
</style>
</head>
<body>
<div class=c>
<div class=h><div class=l>🎮 哈尔滨战术地图</div><div class=s><div class=o></div><span style=color:#00ff88;font-size:10px>在线</span></div><div class=t id=T>00:00</div></div>
<div class=m id=map>
<div class=map-container>
<!-- 罗盘 -->
<div class=compass><span style=margin-left:0>W</span><span style=margin-left:25px>N</span><span style=margin-left:25px>E</span><span style=margin-left:25px>S</span></div>

<div class=map-bg>
<div class=grid></div>

<!-- 街道 -->
<div class="street main-st" style="top:20%;left:5%;width:90%"></div>
<div class="street main-st" style="top:40%;left:5%;width:90%"></div>
<div class="street main-st" style="top:60%;left:5%;width:90%"></div>
<div class="street main-st" style="top:80%;left:5%;width:90%"></div>
<div class="street main-st-v" style="left:20%;top:5%;height:90%"></div>
<div class="street main-st-v" style="left:40%;top:5%;height:90%"></div>
<div class="street main-st-v" style="left:60%;top:5%;height:90%"></div>
<div class="street main-st-v" style="left:80%;top:5%;height:90%"></div>
<div class="street" style="top:10%;height:1px;left:5%;width:90%"></div>
<div class="street" style="top:30%;height:1px;left:5%;width:90%"></div>

<div class="street" style="top:70%;height:1px;left:5%;width:90%"></div>
<div class="street" style="top:90%;height:1px;left:5%;width:90%"></div>
<div class="street" style="left:10%;width:1px;top:5%;height:90%"></div>
<div class="street" style="left:30%;width:1px;top:5%;height:90%"></div>
<div class="street" style="left:50%;width:1px;top:5%;height:90%"></div>
<div class="street" style="left:70%;width:1px;top:5%;height:90%"></div>
<div class="street" style="left:90%;width:1px;top:5%;height:90%"></div>

<!-- 安全区 -->
<div class="zone zone-safe" style="left:30%;top:25%;width:40%;height:50%"></div>
<div class="zone zone-danger" style="left:5%;top:5%;width:25%;height:30%"></div>
<div class="zone zone-drop" style="left:60%;top:50%;width:20%;height:25%"></div>

<!-- 河流 -->
<div class=river style="left:15%;top:15%;width:20%;height:35%"></div>
<div class=river style="left:55%;top:55%;width:15%;height:20%"></div>

<!-- 公园 -->
<div class=park style="left:5%;top:65%;width:10%;height:10%"></div>
<div class=park style="left:70%;top:10%;width:10%;height:12%"></div>
<div class=park style="left:35%;top:70%;width:12%;height:10%"></div>

<!-- 彩色建筑群 -->
<div class="building b-orange" style="left:8%;top:25%;width:15px;height:35px"></div>
<div class="building b-yellow" style="left:15%;top:35%;width:12px;height:40px"></div>
<div class="building b-blue" style="left:25%;top:15%;width:18px;height:50px"></div>
<div class="building b-green" style="left:35%;top:25%;width:14px;height:45px"></div>
<div class="building b-purple" style="left:45%;top:10%;width:16px;height:55px"></div>
<div class="building b-pink" style="left:55%;top:20%;width:15px;height:48px"></div>
<div class="building b-orange" style="left:65%;top:30%;width:14px;height:42px"></div>

<div class="building b-green" style="left:10%;top:55%;width:13px;height:35px"></div>

<div class="building b-pink" style="left:30%;top:50%;width:12px;height:35px"></div>
<div class="building b-orange" style="left:40%;top:60%;width:16px;height:45px"></div>
<div class="building b-yellow" style="left:50%;top:55%;width:14px;height:38px"></div>
<div class="building b-blue" style="left:60%;top:65%;width:13px;height:42px"></div>

<div class="building b-pink" style="left:5%;top:80%;width:10px;height:25px"></div>

<div class="building b-purple" style="left:80%;top:78%;width:12px;height:30px"></div>

<!-- 地标 -->
<div class=landmark style="left:25%;top:30%">📍</div>
<div class=landmark style="left:45%;top:20%">🏢</div>

<!-- 航线 -->
<svg class=flight-path style="top:25%;left:5%;width:90%;height:50%" viewBox="0 0 100 100"><path d="M 5 80 Q 30 60 50 55 Q 70 50 95 25"/></svg>

<!-- 坐标标签 -->
<div class=coord style="left:5%;top:5%">0,0</div>

<div class=coord style="right:5%;bottom:5%">100,100</div>

<!-- 玩家位置 -->

<!-- 方向指示器 -->
<div class=dir-indicator></div>

<!-- 动态飞机 -->
<div id=planes-container></div>
</div>

<!-- 图例 -->
<div class=legend>
<div class=legend-item><span class=legend-dot style=background:rgba(0,255,136,0.5)></span><span>安全区</span></div>
<div class=legend-item><span class=legend-dot style=background:rgba(255,0,0,0.5)></span><span>危险区</span></div>
<div class=legend-item><span class=legend-dot style=background:#ff6b00></span><span>空投区</span></div>
<div class=legend-item><span class=legend-dot style=background:#00ff88></span><span>玩家</span></div>
</div>

<!-- 统计 -->
<div class=stats>
<div class=stats-title>📡 飞行状态</div>
<div class=stats-row><span class=l>飞行器:</span><span class=v id=ac>0</span></div>
<div class=stats-row><span class=l>高度:</span><span class=v id=aa>0m</span></div>
<div class=stats-row><span class=l>速度:</span><span class=v id=as>0km/h</span></div>
<div class=stats-row><span class=l>坐标:</span><span class=v id=coord>50,50</span></div>
</div>

<div class=zoom>

</div>

<div class=f><div class=fi><span class=l>📍:</span><span class=v id=fa>0</span></div><div class=fi><span class=l>🚁:</span><span class=v id=ff>0</span></div><div class=fi><span class=l>📶:</span><span class=v style=color:#00ff88>强</span></div></div>
</div>

<script>
// 100架飞机
const PLANE_COUNT = 100;
const planes = [];
const colors = ['#00ff88','#00d4ff','#ff6b00','#a371f7','#22c55e','#ffcc00','#ec4899','#14b8a6'];
const container = document.getElementById('planes-container');

for(let i=1;i<=PLANE_COUNT;i++){
    const el = document.createElement('div');
    el.className = 'uav';
    el.innerHTML = '<div class=uav-dot></div>';
    const startX = 5 + Math.random()*15;
    const startY = 35 + Math.random()*40;
    const endX = 75 + Math.random()*18;
    const endY = 20 + Math.random()*30;
    const color = colors[i % colors.length];
    el.style.background = `linear-gradient(135deg,${color},${color}88)`;
    el.style.boxShadow = `0 0 15px ${color}`;
    el.style.left = startX+'%';
    el.style.top = startY+'%';
    container.appendChild(el);
    
    planes.push({
        el: el,
        start: {x:startX,y:startY},
        end: {x:endX,y:endY},
        alt: 300 + Math.random()*500,
        speed: 40 + Math.random()*40,
        progress: Math.random()
    });
}

let F=false,Pf=false,Ani,scale=1;
function startAll(){
    if(F&&!Pf)return;
    F=true;Pf=false;
    Ani=setInterval(update,50);
}
function pauseAll(){Pf=!Pf;document.getElementById('bp').textContent=Pf?'▶':'⏸'}
function resetAll(){
    F=false;clearInterval(Ani);
    planes.forEach(p=>{p.progress=Math.random();p.el.style.left=p.start.x+'%';p.el.style.top=p.start.y+'%'});
    updateStats();
}
function update(){
    if(!F||Pf)return;
    let totalAlt=0;
    planes.forEach(p=>{
        p.progress+=0.001;
        if(p.progress>1)p.progress=0;
        const x=p.start.x+(p.end.x-p.start.x)*p.progress;
        const y=p.start.y+(p.end.y-p.start.y)*p.progress+Math.sin(p.progress*Math.PI)*8;
        p.el.style.left=x+'%';
        p.el.style.top=y+'%';
        const h=Math.round(p.alt+Math.sin(p.progress*Math.PI)*200);
        totalAlt+=h;
    });
    const avgAlt=Math.round(totalAlt/PLANE_COUNT);
    document.getElementById('ac').textContent=PLANE_COUNT;
    document.getElementById('aa').textContent=avgAlt+'m';
    document.getElementById('as').textContent=Math.round(40+Math.random()*40)+'km/h';
    document.getElementById('fa').textContent=PLANE_COUNT;
    document.getElementById('ff').textContent=Math.floor(Math.random()*200)+100;
}
function updateStats(){
    document.getElementById('ac').textContent='0';
    document.getElementById('aa').textContent='0m';
}
function zoomIn(){scale=Math.min(scale+0.2,2);document.querySelector('.map-container').style.transform='scale('+scale+')'}
function zoomOut(){scale=Math.max(scale-0.2,0.5);document.querySelector('.map-container').style.transform='scale('+scale+')'}
function T(){
    const n=new Date,h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0');
    document.getElementById('T').textContent=h+':'+m;
}
setInterval(T,1000);T();

// 自动开始
setTimeout(startAll,500);
</script>
</body>
</html>
