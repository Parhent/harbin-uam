<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哈尔滨UAM - 超级增强版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:none}
body{font-family:'Microsoft YaHei',sans-serif;background:#0a0a1a;color:#fff;user-select:none}
.c{flex-direction:column;display:flex;height:100vh;background:linear-gradient(180deg,#050510 0%,#0a0a1a 50%,#0f1525)}
.h{flex-direction:row;justify-content:space-between;align-items:center;display:flex;padding:10px 20px;background:linear-gradient(90deg,#1a1a3a,#0d1d2d);border-bottom:2px solid #00d4ff;box-shadow:0 4px 30px rgba(0,212,255,0.4)}
.l{font-size:18px;font-weight:bold;background:linear-gradient(90deg,#00d4ff,#00ff88,#ff6b00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.s{display:flex;align-items:center;gap:8px}
.o{width:10px;height:10px;background:#00ff88;border-radius:50%;box-shadow:0 0 15px #00ff88;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.9)}}
.t{font-family:monospace;color:#00d4ff;font-size:14px;text-shadow:0 0 10px rgba(0,212,255,0.5)}
.m{flex:1;position:relative;background:#050510;overflow:auto;cursor:grab}
.m:active{cursor:grabbing}

/* 网格 */
.grid{position:absolute;inset:0;background-image:radial-gradient(circle,#00d4ff 0.5px,transparent 0.5px),radial-gradient(circle,#ff6b00 0.3px,transparent 0.3px);background-size:30px 30px,60px 60px;opacity:0.2,0.1}

/* 街道 */
.street{position:absolute;background:rgba(255,255,255,0.08)}
.street-h{height:6px}
.street-v{width:6px}
.main-street{height:10px;background:rgba(255,255,255,0.15)}
.main-street-v{width:10px}

/* 河流 */
.river{position:absolute;background:linear-gradient(180deg,rgba(0,100,200,0.3),rgba(0,150,255,0.5));border-radius:30px;box-shadow:0 0 40px rgba(0,150,255,0.4)}

/* 公园 */
.park{position:absolute;background:rgba(0,200,100,0.1);border-radius:15px;border:2px solid rgba(0,255,136,0.2)}

/* 建筑 - 各种颜色 */
.building{position:absolute;border-radius:3px;opacity:0.95}
.building::before{content:'';position:absolute;top:3px;left:3px;right:3px;height:25%;background:linear-gradient(180deg,rgba(255,255,255,0.25),transparent);border-radius:2px}
.b1{background:linear-gradient(180deg,#ff6b00,#ff3366)}
.b2{background:linear-gradient(180deg,#8b5cf6,#4c1d95)}
.b3{background:linear-gradient(180deg,#00d4ff,#0055aa)}
.b4{background:linear-gradient(180deg,#22c55e,#15803d)}
.b5{background:linear-gradient(180deg,#f97316,#c2410c)}
.b6{background:linear-gradient(180deg,#ec4899,#be185d)}
.b7{background:linear-gradient(180deg,#14b8a6,#0f766e)}
.b8{background:linear-gradient(180deg,#f59e0b,#b45309)}
.b9{background:linear-gradient(180deg,#6366f1,#4338ca)}
.b10{background:linear-gradient(180deg,#84cc16,#4d7c0f)}

/* 路径 */
.path{position:absolute;stroke:#00d4ff;stroke-width:2;stroke-dasharray:10 5;fill:none;opacity:0.5}

/* 飞机 */
.uav{position:absolute;width:28px;height:28px;background:linear-gradient(135deg,#00ff88,#00d4ff);border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 0 25px rgba(0,255,136,0.9);z-index:100;transition:left 0.3s,top 0.3s}
.uav::after{content:'';position:absolute;width:36px;height:36px;border:1px solid rgba(0,255,136,0.5);border-radius:50%;animation:rip 2s infinite}
@keyframes rip{0%{transform:scale(0.8);opacity:1}100%{transform:scale(1.4);opacity:0}}
.uav-id{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:8px;background:rgba(0,0,0,0.8);padding:2px 5px;border-radius:3px;white-space:nowrap;color:#00ff88}

/* 起点终点 */
.sp{position:absolute;width:32px;height:32px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 20px rgba(255,107,0,0.8);z-index:50}
.sp1{background:linear-gradient(135deg,#00d4ff,#8b5cf6)}
.sp2{background:linear-gradient(135deg,#ff6b00,#ff3366)}

/* 标签 */
.lb{position:absolute;padding:5px 10px;background:rgba(0,0,0,0.85);border-radius:6px;font-size:10px;border:1px solid #00d4ff;z-index:60}

/* 面板 */
.panel{position:absolute;background:rgba(10,20,40,0.95);border:1px solid #00d4ff;border-radius:12px;padding:12px;backdrop-filter:blur(10px);box-shadow:0 0 20px rgba(0,212,255,0.3)}
.i{top:10px;right:10px;width:160px}
.ti{font-size:13px;font-weight:bold;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(0,212,255,0.3);color:#00d4ff}
.r{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px}
.r .l{color:#8ecae6}
.r .v{color:#00ff88;font-weight:bold}

.dv{bottom:10px;right:10px}
.ro{display:flex;align-items:center;gap:8px;padding:6px;background:rgba(0,212,255,0.1);border-radius:6px;font-size:10px;margin-bottom:8px}
.btns{display:flex;gap:6px}
.btn{padding:8px 12px;border:none;border-radius:6px;font-size:11px;cursor:pointer;flex:1;font-weight:bold}
.btn:disabled{opacity:0.5}
.btn1{background:linear-gradient(135deg,#00ff88,#00d4ff);color:#000}
.btn2{background:rgba(139,92,246,0.3);color:#c4b5fd;border:1px solid #8b5cf6}
.btn3{background:rgba(255,107,0,0.2);color:#ff6b00;border:1px solid #ff6b00}

.lg{bottom:10px;left:10px;width:120px}
.lg div{font-size:10px;color:#8ecae6;margin-bottom:4px}
.lg item{display:flex;align-items:center;gap:6px;font-size:9px;margin-bottom:3px}
.cb{width:12px;height:12px;border-radius:2px}

.f{flex-direction:row;justify-content:space-around;display:flex;padding:10px 20px;background:linear-gradient(90deg,#1a1a3a,#0d1d2d);border-top:2px solid #00d4ff}
.fi{display:flex;gap:6px;font-size:11px}
.fi .l{color:#8ecae6}
.fi .v{color:#00ff88;font-weight:bold}

/* 飞机列表 */
.plane-list{top:10px;left:10px;width:140px;max-height:180px;overflow-y:auto}
.plane-title{font-size:11px;color:#00d4ff;font-weight:bold;margin-bottom:6px}
.plane-item{font-size:9px;color:#8ecae6;margin-bottom:3px;padding:3px;background:rgba(0,212,255,0.08);border-radius:3px}

/* 统计 */
.stats{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(10,20,40,0.95);border:1px solid #00d4ff;border-radius:10px;padding:8px 15px;display:flex;gap:20px}
.stat{text-align:center}
.stat-n{font-size:16px;font-weight:bold;color:#00ff88}
.stat-l{font-size:9px;color:#8ecae6}
</style>

<script>
// 30架飞机系统
const PLANE_COUNT = 30;
const planes = [];
const colors = ['#00ff88','#00d4ff','#ff6b00','#a371f7','#22c55e','#f97316','#ec4899','#14b8a6','#f59e0b','#6366f1'];
const container = document.getElementById('planes-container');

for(let i=1;i<=PLANE_COUNT;i++){
    const el = document.createElement('div');
    el.className = 'uav';
    el.id = 'U'+i;
    el.innerHTML = '🚁<div class=uav-id></div>';
    const startX = 5 + Math.random()*15;
    const startY = 45 + Math.random()*35;
    const endX = 75 + Math.random()*20;
    const endY = 20 + Math.random()*25;
    const baseAlt = 250 + Math.random()*550;
    const color = colors[i % colors.length];
    const speed = 50 + Math.random()*40;
    el.style.background = `linear-gradient(135deg,${color},${color}88)`;
    el.style.boxShadow = `0 0 25px ${color}99`;
    el.style.left = startX+'%';
    el.style.top = startY+'%';
    container.appendChild(el);
    
    planes.push({
        el: el,
        id: 'EVTOL-'+String(i).padStart(2,'0'),
        start: {x:startX,y:startY},
        end: {x:endX,y:endY},
        baseAlt: baseAlt,
        speed: speed,
        progress: Math.random(),
        color: color
    });
}

let F=false,Pf=false,Ani;
function startAll(){
    if(F&&!Pf)return;
    F=true;Pf=false;
    document.getElementById('btn-p').disabled=false;
    Ani=setInterval(update,80);
}
function pauseAll(){
    if(!F)return;
    Pf=!Pf;
    document.getElementById('btn-p').textContent = Pf?'▶':'⏸';
}
function resetAll(){
    F=false;Pf=false;clearInterval(Ani);
    planes.forEach(p=>{
        p.progress = Math.random();
        p.el.style.left = p.start.x+'%';
        p.el.style.top = p.start.y+'%';
    });
    updateUI();
}
function update(){
    if(!F||Pf)return;
    let totalAlt=0,totalSpeed=0;
    planes.forEach((p,i)=>{
        p.progress+=0.002;
        if(p.progress>1)p.progress=0;
        const x = p.start.x + (p.end.x-p.start.x)*p.progress;
        const y = p.start.y + (p.end.y-p.start.y)*p.progress + Math.sin(p.progress*Math.PI)*15;
        p.el.style.left = x+'%';
        p.el.style.top = y+'%';
        const h = Math.round(p.baseAlt + Math.sin(p.progress*Math.PI)*300);
        p.el.querySelector('.uav-id').textContent = p.id+' '+h+'m';
        totalAlt+=h;
        totalSpeed+=p.speed;
    });
    const avgAlt = Math.round(totalAlt/PLANE_COUNT);
    const avgSpeed = Math.round(totalSpeed/PLANE_COUNT);
    document.getElementById('plane-count').textContent = PLANE_COUNT;
    document.getElementById('avg-alt').textContent = avgAlt;
    document.getElementById('avg-speed').textContent = avgSpeed;
    document.getElementById('active').textContent = PLANE_COUNT;
    document.getElementById('avg-alt2').textContent = avgAlt+' m';
    document.getElementById('avg-speed2').textContent = avgSpeed+' km/h';
    document.getElementById('flights').textContent = Math.floor(Math.random()*500)+100;
    document.getElementById('footer-active').textContent = PLANE_COUNT;
    document.getElementById('footer-flights').textContent = Math.floor(Math.random()*500)+100;
}
function updateUI(){
    document.getElementById('plane-count').textContent = '0';
    document.getElementById('avg-alt').textContent = '0';
    document.getElementById('avg-speed').textContent = '0';
    document.getElementById('active').textContent = '0';
    document.getElementById('avg-alt2').textContent = '0 m';
    document.getElementById('avg-speed2').textContent = '0 km/h';
    document.getElementById('footer-active').textContent = '0';
}
function T(){
    const n=new Date,h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');
    document.getElementById('T').textContent=h+':'+m+':'+s;
}
setInterval(T,1000);T();
</script>
