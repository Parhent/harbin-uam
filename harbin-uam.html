.cb{width:12px;height:12px;border-radius:2px}
.f{display:flex;justify-content:space-around;padding:10px 20px;background:rgba(22,27,34,.95);border-top:1px solid #30363d}
.fi{display:flex;gap:6px;font-size:11px}
.fi .l{color:#8b949e}
.fi .v{color:#58a6ff;font-family:monospace}
